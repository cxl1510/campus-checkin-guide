<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="校园打卡指南 - 探索校园必打卡的6个经典地点" />
  <title>校园打卡指南</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 头部区域 -->
  <header class="site-header" id="siteHeader">
    <div class="container">
      <h1 class="site-title">校园打卡指南</h1>
      <p class="site-intro">
        探索校园里最值得打卡的6个经典地点，记录属于你的青春记忆。
      </p>
    </div>
  </header>

  <!-- 主体内容 -->
  <main class="site-main">
    <div class="container">
      <!-- 筛选栏 -->
      <section class="filter-bar" aria-label="筛选与排序">
        <!-- 分类按钮组 -->
        <div class="filter-group filter-categories" role="group" aria-label="分类筛选">
          <button class="filter-btn is-active" data-category="all" type="button">全部</button>
          <button class="filter-btn" data-category="landmark" type="button">标志建筑</button>
          <button class="filter-btn" data-category="food" type="button">美食</button>
          <button class="filter-btn" data-category="study" type="button">学习</button>
          <button class="filter-btn" data-category="sports" type="button">运动</button>
        </div>

        <!-- 搜索与排序 -->
        <div class="filter-group filter-controls">
          <input
            class="search-input"
            id="searchInput"
            type="search"
            placeholder="搜索打卡点..."
            aria-label="搜索打卡点"
          />
          <select class="sort-select" id="sortSelect" aria-label="排序方式">
            <option value="default">默认排序</option>
            <option value="name">名称排序</option>
            <option value="likes">点赞数排序</option>
          </select>
        </div>
      </section>

      <!-- 打卡点卡片网格（动态渲染） -->
      <section class="card-grid" id="cardGrid" aria-label="打卡点列表">
        <!-- 卡片由 JavaScript 动态生成 -->
      </section>

      <!-- 无结果提示 -->
      <div class="no-results" id="noResults" hidden>
        <p>没有找到匹配的打卡点，换个关键词试试？</p>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-text">
        校园打卡指南 &copy; 2026 · 记录青春，留住美好
      </p>
    </div>
  </footer>

  <!-- 详情弹窗模态框 -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-content" id="modalContent" role="document">
      <!-- 关闭按钮 -->
      <button class="modal-close" id="modalClose" type="button" aria-label="关闭弹窗">
        &times;
      </button>

      <!-- 弹窗图片 -->
      <!-- 建议替换为AI生成图片 -->
      <img class="modal-image" id="modalImage" src="" alt="" />

      <!-- 弹窗信息区 -->
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <span class="modal-category" id="modalCategory"></span>
        <p class="modal-desc" id="modalDesc"></p>

        <!-- 小贴士 -->
        <div class="modal-tips" id="modalTipsWrap">
          <h3>打卡小贴士</h3>
          <ul id="modalTipsList"></ul>
        </div>

        <!-- 点赞 -->
        <button class="like-btn" id="modalLikeBtn" type="button" aria-label="点赞">
          <span class="like-icon" aria-hidden="true">&#9829;</span>
          <span class="like-count" id="modalLikeCount">0</span>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
